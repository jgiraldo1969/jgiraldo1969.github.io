<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PUNTO.PUNTO.-RAYA</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 15%; background-color: #1a1a1a; color: white; }
        .btn { display: block; padding: 20px; margin: 20px auto; width: 80%; font-size: 18px; font-weight: bold; color: white; background-color: #d4af37; text-decoration: none; border-radius: 50px; border: 3px solid white; }
        .btn-secundario { background-color: #555; border-color: #888; }
    </style>
</head>
<body>
    <h2>¡AUTENTICACIÓN EXITOSA!</h2>
    <p>Toca uno de los botones para regresar</p>
    
    <a id="btn-intent" class="btn" href="#">OPCIÓN 1: ENTRAR AL JUEGO</a>
    <a id="btn-directo" class="btn btn-secundario" href="#">OPCIÓN 2: ENTRAR AL JUEGO</a>

    <script>
        // Obtenemos los datos de Google
        var params = window.location.search;
        var paquete = "com.jgsgames.puntoraya";
        
        // Construimos las dos URL
        var urlIntent = "intent://login" + params + "#Intent;scheme=puntoraya;package=" + paquete + ";end";
        var urlDirecta = "puntoraya://login" + params;
        
        // Se las inyectamos directamente a los enlaces
        document.getElementById("btn-intent").href = urlIntent;
        document.getElementById("btn-directo").href = urlDirecta;
    </script>
</body>
</html>
