<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Regresando al juego...</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 20%; background-color: #2b2b2b; color: white; }
        .btn { display: inline-block; padding: 15px 30px; font-size: 20px; font-weight: bold; color: white; background-color: #d4af37; text-decoration: none; border-radius: 10px; margin-top: 30px; border: 2px solid #fff; cursor: pointer; }
    </style>
</head>
<body>
    <h2>¡Inicio de sesión exitoso!</h2>
    <p>Por favor, presiona el botón para volver al juego</p>
    
    <a id="btn-regresar" class="btn">VOLVER A JUGAR</a>

    <script>
        // Obtenemos los datos que nos manda Google
        var datos = window.location.search;
        
        // Armamos el enlace simple directo a tu juego
        var enlaceJuego = "puntoraya://login" + datos;

        // Le ponemos el enlace al botón dorado
        document.getElementById("btn-regresar").href = enlaceJuego;

        // Intentamos que salte solito en 1 segundo (ahora que la puerta está abierta)
        setTimeout(function() {
            window.location.href = enlaceJuego;
        }, 1000);
    </script>
</body>
</html>
