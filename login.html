<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PUNTO.PUNTO.-RAYA</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 20%; background-color: #1a1a1a; color: white; }
        .btn { display: inline-block; padding: 20px 40px; font-size: 22px; font-weight: bold; color: white; background-color: #d4af37; text-decoration: none; border-radius: 50px; border: 3px solid white; cursor: pointer; }
    </style>
</head>
<body>
    <h2>¡AUTENTICACIÓN EXITOSA!</h2>
    <p>Presiona el botón para volver al combate</p>
    
    <a id="btn-regresar" class="btn">ENTRAR AL JUEGO</a>

    <script>
        document.getElementById("btn-regresar").addEventListener("click", function() {
            var params = window.location.search;
            
            var paquete = "com.jgsgames.puntoraya"; 
            
            // Este es el enlace "Misil": si la app está instalada, se abre sí o sí
            var intentUrl = "intent://login" + params + "#Intent;scheme=puntoraya;package=" + paquete + ";end";
            
            window.location.href = intentUrl;
        });

        // Intento automático
        setTimeout(function() { document.getElementById("btn-regresar").click(); }, 1500);
    </script>
</body>
</html>
